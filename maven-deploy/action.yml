name: Maven Deploy to GitHub Packages
description: Build and deploy Maven artifacts to GitHub Packages

inputs:
  java-version:
    description: JDK version
    default: "21"
  pom-file:
    description: Path to pom.xml
    default: pom.xml
  token:
    description: Token for GitHub Packages auth (needs write:packages). Defaults to GITHUB_TOKEN.
    default: ""
  min-versions-to-keep:
    description: Minimum number of package versions to keep (0 to disable pruning)
    default: "5"

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: maven
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - shell: bash
      run: mvn -B deploy -DskipTests -f ${{ inputs.pom-file }}
      env:
        GITHUB_TOKEN: ${{ inputs.token != '' && inputs.token || github.token }}

    - id: pkg-info
      if: ${{ inputs.min-versions-to-keep != '0' }}
      shell: bash
      run: |
        POM="${{ inputs.pom-file }}"
        GROUP_ID=$(mvn -q -f "$POM" help:evaluate -Dexpression=project.groupId -DforceStdout)
        ARTIFACT_ID=$(mvn -q -f "$POM" help:evaluate -Dexpression=project.artifactId -DforceStdout)
        echo "package-name=${GROUP_ID}.${ARTIFACT_ID}" >> "$GITHUB_OUTPUT"

    - uses: actions/delete-package-versions@v5
      if: ${{ inputs.min-versions-to-keep != '0' }}
      with:
        package-name: ${{ steps.pkg-info.outputs.package-name }}
        package-type: maven
        min-versions-to-keep: ${{ inputs.min-versions-to-keep }}
        token: ${{ github.token }}

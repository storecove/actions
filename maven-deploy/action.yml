name: Maven Deploy to GitHub Packages
description: Build and deploy Maven artifacts to GitHub Packages

inputs:
  java-version:
    description: JDK version
    default: "21"
  pom-file:
    description: Path to pom.xml
    default: pom.xml
  token:
    description: Token for GitHub Packages auth (needs write:packages). Defaults to GITHUB_TOKEN.
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: maven
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - shell: bash
      run: mvn -B deploy -DskipTests -f "$POM_FILE"
      env:
        POM_FILE: ${{ inputs.pom-file }}
        GITHUB_TOKEN: ${{ inputs.token != '' && inputs.token || github.token }}
